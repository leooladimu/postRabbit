<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="64" fill="#FFFFFF"/>
  
  <!-- Rabbit silhouette -->
  <g fill="#C4441A">
    <!-- Left ear -->
    <ellipse cx="48" cy="35" rx="8" ry="22" transform="rotate(-15 48 35)"/>
    <!-- Right ear -->
    <ellipse cx="72" cy="32" rx="8" ry="24" transform="rotate(10 72 32)"/>
    <!-- Head -->
    <circle cx="60" cy="58" r="20"/>
    <!-- Body -->
    <ellipse cx="62" cy="85" rx="22" ry="18"/>
    <!-- Tail -->
    <circle cx="82" cy="88" r="8"/>
  </g>
</svg>
