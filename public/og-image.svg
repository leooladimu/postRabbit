<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf3e8"/>
  
  <!-- Texture overlay -->
  <rect width="1200" height="630" fill="url(#noise)" opacity="0.03"/>
  
  <!-- Gradient accent -->
  <ellipse cx="600" cy="315" rx="500" ry="350" fill="url(#gradient)" opacity="0.15"/>
  
  <!-- Logo (centered and larger) -->
  <g transform="translate(200, 180)">
    <!-- Rabbit -->
    <path d="M0 60 Q10 20 30 10 Q40 5 50 10 L55 8 Q58 6 60 8 L62 6 Q64 5 65 7 L67 10 Q70 5 75 10 Q85 5 95 10 Q115 20 125 60 L120 65 Q110 50 95 45 L90 50 Q85 45 80 50 L75 45 Q70 50 65 45 L60 50 Q50 45 40 50 L35 45 Q25 50 15 55 L5 65 Z" fill="#c4441a"/>
    <circle cx="55" cy="25" r="3" fill="#faf3e8"/>
    
    <!-- postRabbit text -->
    <text x="140" y="50" font-family="'Playfair Display', serif" font-size="72" font-weight="900" fill="#c4441a">post</text>
    <text x="340" y="50" font-family="'Playfair Display', serif" font-size="72" font-weight="900" fill="#d4622a">Rabbit</text>
    
    <!-- Tagline -->
    <text x="140" y="85" font-family="'DM Sans', sans-serif" font-size="24" font-weight="300" letter-spacing="4" fill="#8c6040">CREATE. POST. GROW.</text>
  </g>
  
  <!-- Subtitle -->
  <text x="600" y="480" font-family="'DM Sans', sans-serif" font-size="32" font-weight="400" fill="#5c2e0e" text-anchor="middle">AI-Powered SEO Content for Local Businesses</text>
  
  <!-- Defs -->
  <defs>
    <radialGradient id="gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8834a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e8834a" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
    </filter>
  </defs>
</svg>
